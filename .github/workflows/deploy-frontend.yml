name: Deploy Admin Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'admin/frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'admin/frontend/package-lock.json'

      - name: Build Admin Frontend
        run: |
          cd admin/frontend
          npm install
          npm run build
        env:
          VITE_API_BASE: https://admin-backend.LiangFeng111.workers.dev/api

      - name: Create Cloudflare Pages Project (if not exists)
        run: npx wrangler pages project create xxx-admin-frontend-pages --production-branch master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 直接部署编译生成的 dist 文件夹
          command: pages deploy admin/frontend/dist --project-name=xxx-admin-frontend-pages --branch=master --commit-dirty=true
