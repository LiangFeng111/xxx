<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级书签转换器 V2 - 喜淘网</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto space-y-8">
        <header class="text-center space-y-4">
            <h1 class="text-4xl md:text-5xl font-black gradient-text tracking-tighter">书签层级转换器 V2</h1>
            <p class="text-slate-400 font-medium">完美解析浏览器多级文件夹结构，生成递归树形 JSON</p>
        </header>

        <main class="grid grid-cols-1 gap-8">
            <div id="drop-zone" class="glass rounded-[2rem] p-12 border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all text-center cursor-pointer group">
                <input type="file" id="file-input" accept=".html" class="hidden">
                <div class="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-400 group-hover:scale-110 transition-transform">
                    <i data-lucide="folder-tree" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">点击或拖拽 HTML 书签文件</h3>
                <p class="text-slate-500 text-sm">将保留你浏览器中所有的文件夹嵌套关系</p>
            </div>

            <div id="result-area" class="hidden space-y-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="file-json" class="text-indigo-400"></i> 树形 JSON 结果
                        <span id="stats" class="text-xs bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full ml-2"></span>
                    </h3>
                    <div class="flex gap-3">
                        <button id="copy-btn" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                            <i data-lucide="copy" class="w-4 h-4"></i> 复制树形 JSON
                        </button>
                        <button id="download-btn" class="px-6 py-2 glass hover:bg-white/10 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                            <i data-lucide="download" class="w-4 h-4"></i> 下载文件
                        </button>
                    </div>
                </div>
                <div class="glass rounded-2xl p-6">
                    <pre id="json-output" class="text-[10px] text-indigo-200 font-mono overflow-auto max-h-[500px] whitespace-pre"></pre>
                </div>
            </div>
        </main>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const jsonOutput = document.getElementById('json-output');
        const stats = document.getElementById('stats');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');

        lucide.createIcons();

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-indigo-500');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const tree = parseNetscapeBookmarks(e.target.result);
                renderResult(tree);
            };
            reader.readAsText(file);
        }

        /**
         * 递归解析 Netscape 格式书签
         */
        function parseNetscapeBookmarks(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // 找到根容器 (通常是第一个 DL)
            const rootDl = doc.querySelector('dl');
            if (!rootDl) return { links: [] };

            function walk(dl) {
                const items = [];
                // 获取直接子级 dt
                const dts = Array.from(dl.children).filter(el => el.tagName.toLowerCase() === 'dt');
                
                dts.forEach(dt => {
                    const h3 = dt.querySelector(':scope > h3');
                    const a = dt.querySelector(':scope > a');
                    const subDl = dt.querySelector(':scope > dl');

                    if (h3 && subDl) {
                        const folderName = h3.textContent.trim();
                        // 如果是“书签栏”，则跳过该层级，直接将其子项平铺到当前层
                        if (folderName === '书签栏' || folderName === 'Bookmarks Bar' || folderName === '收藏夹栏') {
                            items.push(...walk(subDl));
                        } else {
                            // 这是一个普通文件夹
                            items.push({
                                type: 'folder',
                                name: folderName,
                                children: walk(subDl)
                            });
                        }
                    } else if (a) {
                        // 这是一个链接
                        const url = a.getAttribute('href');
                        if (url && !url.startsWith('chrome://')) {
                            items.push({
                                type: 'link',
                                title: a.textContent,
                                url: url,
                                icon: 'link'
                            });
                        }
                    }
                });
                return items;
            }

            return { links: walk(rootDl) };
        }

        function renderResult(data) {
            resultArea.classList.remove('hidden');
            jsonOutput.textContent = JSON.stringify(data, null, 2);
            let count = 0;
            const countLinks = (arr) => arr.forEach(i => i.type === 'link' ? count++ : countLinks(i.children));
            countLinks(data.links);
            stats.textContent = `共 ${count} 个链接`;
            window.scrollTo({ top: resultArea.offsetTop, behavior: 'smooth' });
        }

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(jsonOutput.textContent);
            alert('已复制到剪贴板');
        };

        downloadBtn.onclick = () => {
            const blob = new Blob([jsonOutput.textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'converted_bookmarks.json';
            a.click();
        };
    </script>
</body>
</html>
