<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签转换工具 - 喜淘网工具箱</title>
    <script src="js/tailwindcss.js"></script>
    <script src="js/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        pre { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-4">
            <h1 class="text-4xl md:text-5xl font-black gradient-text tracking-tighter">书签转换工具</h1>
            <p class="text-slate-400 font-medium">将浏览器导出的 HTML 书签文件转换为项目 data.json 格式</p>
        </header>

        <!-- Main Content -->
        <main class="grid grid-cols-1 gap-8">
            <!-- Upload Area -->
            <div id="drop-zone" class="glass rounded-[2rem] p-12 border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all text-center cursor-pointer group">
                <input type="file" id="file-input" accept=".html" class="hidden">
                <div class="w-20 h-20 bg-indigo-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 text-indigo-400 group-hover:scale-110 transition-transform">
                    <i data-lucide="upload-cloud" class="w-10 h-10"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">点击或拖拽 HTML 书签文件到这里</h3>
                <p class="text-slate-500 text-sm">支持从 Chrome, Edge, Firefox 导出的书签文件</p>
            </div>

            <!-- Result Area (Hidden by default) -->
            <div id="result-area" class="hidden space-y-6 animate-in fade-in duration-500">
                <div class="flex items-center justify-between">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        <i data-lucide="file-json" class="text-indigo-400"></i> 转换结果
                        <span id="stats" class="text-xs bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full ml-2"></span>
                    </h3>
                    <div class="flex gap-3">
                        <button id="copy-btn" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                            <i data-lucide="copy" class="w-4 h-4"></i> 复制代码
                        </button>
                        <button id="download-btn" class="px-6 py-2 glass hover:bg-white/10 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                            <i data-lucide="download" class="w-4 h-4"></i> 下载 JSON
                        </button>
                    </div>
                </div>
                <div class="glass rounded-2xl p-6 overflow-hidden">
                    <pre id="json-output" class="text-xs text-indigo-200 font-mono overflow-auto max-h-[500px] whitespace-pre-wrap"></pre>
                </div>
            </div>
        </main>

        <footer class="text-center text-slate-600 text-xs font-bold">
            <p>本地处理，数据安全 · 喜淘网工具箱专用</p>
        </footer>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const jsonOutput = document.getElementById('json-output');
        const stats = document.getElementById('stats');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');

        let convertedJson = null;

        // Initialize Lucide icons
        lucide.createIcons();

        // Handle file selection
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        // Drag & Drop
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-indigo-500');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => parseBookmarks(e.target.result);
            reader.readAsText(file);
        }

        function parseBookmarks(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const rootDl = doc.querySelector('dl');
            
            if (!rootDl) {
                alert('未能在 HTML 中找到有效的书签结构 (DL 标签)');
                return;
            }

            function walk(dl) {
                const items = [];
                // 只获取直接子级 DT
                const dts = Array.from(dl.children).filter(el => el.tagName.toLowerCase() === 'dt');
                
                dts.forEach(dt => {
                    const h3 = dt.querySelector(':scope > h3');
                    const a = dt.querySelector(':scope > a');
                    const subDl = dt.querySelector(':scope > dl');

                    if (h3 && subDl) {
                        const folderName = h3.textContent.trim();
                        // 跳过“书签栏”层级，直接展开其子项
                        if (folderName === '书签栏' || folderName === 'Bookmarks Bar' || folderName === '收藏夹栏') {
                            items.push(...walk(subDl));
                        } else {
                            // 普通文件夹，递归解析
                            items.push({
                                type: 'folder',
                                name: folderName,
                                children: walk(subDl)
                            });
                        }
                    } else if (a) {
                        // 链接
                        const url = a.getAttribute('href');
                        if (url && !url.startsWith('chrome://')) {
                            let iconUrl = 'link';
                            try {
                                // 提取链接的域名 (hostname)
                                const domain = new URL(url).hostname;
                                // 使用国内稳定的 Favicon 聚合接口替换被墙的 Google 服务
                                iconUrl = `https://api.iowen.cn/favicon/${domain}.png`;
                            } catch (e) {
                                console.warn('URL 解析失败:', url);
                            }

                            items.push({
                                type: 'link',
                                title: a.textContent.trim(),
                                url: url,
                                icon: iconUrl
                            });
                        }
                    }
                });
                return items;
            }

            const treeData = walk(rootDl);
            convertedJson = { links: treeData };
            renderResult(convertedJson);
        }

        function countLinks(nodes) {
            let count = 0;
            nodes.forEach(n => {
                if (n.type === 'link') count++;
                else if (n.children) count += countLinks(n.children);
            });
            return count;
        }

        function renderResult(data) {
            resultArea.classList.remove('hidden');
            jsonOutput.textContent = JSON.stringify(data, null, 2);
            const totalLinks = countLinks(data.links);
            stats.textContent = `解析到 ${data.links.length} 个顶级分类，共 ${totalLinks} 条书签`;
            window.scrollTo({ top: resultArea.offsetTop, behavior: 'smooth' });
        }

        // Copy functionality
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(jsonOutput.textContent);
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> 已复制';
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        };

        // Download functionality
        downloadBtn.onclick = () => {
            const blob = new Blob([jsonOutput.textContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'converted_bookmarks.json';
            a.click();
            URL.revokeObjectURL(url);
        };
    </script>
</body>
</html>
