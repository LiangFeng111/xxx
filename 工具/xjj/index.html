<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小姐姐在线随机播放 - 沉浸滑动版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: none; /* 禁用系统默认手势 */
        }

        .main-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .video-wrapper {
            position: absolute;
            width: 100%;
            height: 100%; /* 恢复容器高度，支持 absolute 子元素 */
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }

        .video-slide {
            width: 100%;
            height: 100%; /* 子元素占据 100% 容器高度 */
            position: absolute; /* 改回绝对定位，确保精确控制每一页 */
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            /* 强制拉伸到视口尺寸，然后通过 object-fit: contain 自动缩放并保持比例 */
            width: 100% !important;
            height: 100% !important;
            object-fit: contain; 
            background: #000;
        }

        @media (max-width: 768px) {
            video {
                width: 100%;
                height: 100%;
                object-fit: contain;
            }
        }

        /* UI 组件样式保持原样并优化 */
        .side-controls {
            position: fixed;
            right: 16px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
            transition: opacity 0.3s, transform 0.3s;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 0.3s;
        }

        .bottom-info {
            position: fixed;
            left: 16px;
            bottom: 60px;
            right: 80px;
            z-index: 100;
            color: white;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: opacity 0.3s, transform 0.3s;
        }

        .progress-container {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            height: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 110;
            transition: opacity 0.3s;
        }

        /* 沉浸模式隐藏 UI */
        .immersive-hide {
            opacity: 0 !important;
            pointer-events: none !important;
            transform: translateY(20px);
        }

        .side-controls.immersive-hide {
            transform: translateX(20px);
        }

        .progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .progress-bar {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
        }

        .state-icon {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 150;
            pointer-events: none;
            opacity: 0;
        }

        .state-icon.animate {
            animation: icon-pop 0.6s ease-out;
        }

        @keyframes icon-pop {
            0% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(2.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        .loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
        }

        .loading-ring {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hint-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-viewport" id="viewport">
        <div class="video-wrapper" id="wrapper">
            <!-- 视频滑块将由 JS 动态创建 -->
        </div>

        <!-- UI 覆盖层 -->
        <div class="side-controls">
            <button id="immersive-btn" class="control-btn shadow-lg" title="沉浸模式">
                <i data-lucide="maximize-2" class="w-6 h-6"></i>
            </button>
            <button id="auto-btn" class="control-btn shadow-lg bg-indigo-600" title="自动连播">
                <i data-lucide="play-circle" class="w-6 h-6"></i>
            </button>
            <button id="mute-btn" class="control-btn shadow-lg text-red-400" title="静音控制">
                <i data-lucide="volume-x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="bottom-info">
            <div class="tag bg-white/10 backdrop-blur px-3 py-1 rounded-full text-xs font-bold mb-2 inline-block"># 沉浸式滑动</div>
            <h1 class="text-xl font-black mb-1">随机播放频道</h1>
            <p class="text-sm text-gray-300 opacity-80" id="status-text">上下划切换，左划返回主页</p>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div id="state-icon" class="state-icon"></div>

        <div id="loader" class="loader">
            <div class="loading-ring"></div>
        </div>

        <div id="hint-overlay" class="hint-overlay" onclick="initApp(event)">
            <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center mb-6 backdrop-blur-md border border-white/20">
                <i data-lucide="play" class="w-10 h-10 fill-white ml-1"></i>
            </div>
            <p class="font-bold tracking-widest text-sm uppercase">点击开启沉浸之旅</p>
            <p class="text-xs text-gray-500 mt-4">支持上下滑动切换视频</p>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('wrapper');
        const viewport = document.getElementById('viewport');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const stateIcon = document.getElementById('state-icon');
        const autoBtn = document.getElementById('auto-btn');
        const muteBtn = document.getElementById('mute-btn');
        const immersiveBtn = document.getElementById('immersive-btn');
        const hintOverlay = document.getElementById('hint-overlay');

        let videoHistory = []; // 存储已获取的视频 URL
        let currentIndex = -1;
        let isAuto = true;
        let isMuted = true; // 默认静音
        let isImmersive = false; // 沉浸模式状态
        let isDraggingProgress = false;
        let isSwiping = false;
        let startX = 0;
        let startY = 0;
        let currentTranslateY = 0;

        const API_URL = 'https://api.yujn.cn/api/zzxjj.php';

        // 初始化图标
        lucide.createIcons();

        /**
         * 生成唯一视频 URL
         * 接口每次请求返回不同视频，但浏览器会缓存相同的 URL 请求。
         * 为了让“上滑回看”有效，每个历史视频必须有唯一的参数。
         */
        function getNextVideoUrl() {
            const index = videoHistory.length;
            // 使用 index 作为标识，确保每个视频槽位的 URL 唯一
            // 同时加入随机数，防止浏览器在不同 session 间缓存
            return `${API_URL}?_idx=${index}&_r=${Math.random().toString(36).substr(2, 8)}`;
        }

        // 定义创建函数之前需要先声明
        function createSlide(index, url) {
            // 如果已经存在，直接返回
            const existing = document.getElementById(`player-${index}`);
            if (existing) return existing;

            const slide = document.createElement('div');
            slide.className = 'video-slide';
            slide.id = `slide-${index}`;
            // 关键：绝对定位并根据 index 计算 top
            slide.style.top = `${index * 100}%`;
            
            const video = document.createElement('video');
            video.id = `player-${index}`;
            video.src = url;
            video.playsInline = true;
            video.webkitPlaysInline = true;
            video.setAttribute('x5-video-player-type', 'h5-page');
            video.setAttribute('x5-video-orientation', 'portrait');
            video.loop = false;
            video.muted = isMuted;
            video.preload = 'metadata'; // 按照用户成功的示例改为 metadata
            
            // 解决“无画面”：显式调用 load() 强制浏览器开始拉取数据
            video.load();
            
            const hideLoader = () => {
                if(index === currentIndex) {
                    loader.style.display = 'none';
                    // 状态同步：确保进度条正确
                    if (video.duration) {
                        const percent = (video.currentTime / video.duration) * 100;
                        progressBar.style.width = `${percent}%`;
                    }
                }
            };

            video.onloadedmetadata = hideLoader;
            video.onloadeddata = hideLoader;
            video.oncanplay = hideLoader;
            video.onplaying = hideLoader;
            
            video.onended = () => { if(isAuto && index === currentIndex) navigate(1); };
            video.onerror = () => { 
                console.error(`视频 ${index} 加载错误 (可能是 404)`);
                if (index === currentIndex) {
                    document.getElementById('status-text').innerText = '当前视频失效，正在为您寻找下一条...';
                    loader.style.display = 'block';
                    // 稍微延迟一下，避免无限快速重试导致浏览器卡顿
                    setTimeout(() => navigate(1), 1000); 
                }
            };
            video.ontimeupdate = () => {
                if (index === currentIndex && !isDraggingProgress) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressBar.style.width = `${percent}%`;
                }
            };

            slide.appendChild(video);
            wrapper.appendChild(slide);
            return video;
        }

        // --- 预加载逻辑 ---
        // 初始加载：只生成第一个 URL 并预创建节点
        const firstUrl = getNextVideoUrl();
        videoHistory.push(firstUrl);
        createSlide(0, firstUrl);

        // 核心跳转逻辑
        async function navigate(direction) {
            const newIndex = currentIndex + direction;
            
            // 边界检查
            if (newIndex < 0) {
                bounceEffect();
                return;
            }

            // 暂停当前视频
            if (currentIndex >= 0) {
                const currentVideo = document.getElementById(`player-${currentIndex}`);
                if (currentVideo) currentVideo.pause();
            }

            // 更新索引
            currentIndex = newIndex;

            // 确保目标视频存在于 history 中
            while (currentIndex >= videoHistory.length) {
                videoHistory.push(getNextVideoUrl());
            }

            // 确保 DOM 节点已创建
            let targetVideo = document.getElementById(`player-${currentIndex}`);
            if (!targetVideo) {
                targetVideo = createSlide(currentIndex, videoHistory[currentIndex]);
            }

            // 执行滑动动画
            currentTranslateY = -currentIndex * 100;
            wrapper.style.transform = `translateY(${currentTranslateY}%)`;

            // 检查 readyState，如果已经就绪则隐藏 loader
            if (targetVideo.readyState >= 2) {
                loader.style.display = 'none';
            } else {
                loader.style.display = 'block';
            }

            // 播放逻辑
            try {
                targetVideo.muted = isMuted;
                const playPromise = targetVideo.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        loader.style.display = 'none';
                    }).catch(e => {
                        console.warn('播放受限，等待点击');
                        loader.style.display = 'none';
                    });
                }
            } catch (e) {
                console.warn('播放执行异常:', e);
                loader.style.display = 'none';
            }

            // 预加载下一个
            preloadNext();
        }

        /**
         * 预获取下一个视频地址并创建节点
         */
        function preloadNext() {
            const nextIndex = currentIndex + 1;
            if (nextIndex >= videoHistory.length) {
                videoHistory.push(getNextVideoUrl());
            }
            if (!document.getElementById(`player-${nextIndex}`)) {
                createSlide(nextIndex, videoHistory[nextIndex]);
            }
        }

        // 弹回效果
        function bounceEffect() {
            wrapper.style.transform = `translateY(${currentTranslateY + (currentIndex === 0 ? 5 : -5)}%)`;
            setTimeout(() => {
                wrapper.style.transform = `translateY(${currentTranslateY}%)`;
            }, 200);
        }

        // 初始化应用
        function initApp(e) {
            if (e) e.stopPropagation(); // 阻止事件冒泡到 viewport
            
            // 立即执行 navigate(1)，确保 play() 调用在用户点击的事件栈中，绕过浏览器对自动播放的拦截
            navigate(1);
            
            hintOverlay.style.opacity = '0';
            setTimeout(() => {
                hintOverlay.style.display = 'none';
            }, 500);
        }

        // --- 手势处理 ---
        viewport.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            startX = e.touches[0].clientX;
            isSwiping = true;
            wrapper.style.transition = 'none';
        }, {passive: true});

        viewport.addEventListener('touchmove', e => {
            if (!isSwiping) return;
            const deltaY = e.touches[0].clientY - startY;
            const deltaX = e.touches[0].clientX - startX;
            
            // 如果横向偏移大于纵向，判定为横向手势
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 如果是左滑，可以做点视觉反馈，但这里保持原位等待 touchend
                return;
            }

            const move = (currentTranslateY * viewport.clientHeight / 100) + deltaY;
            wrapper.style.transform = `translateY(${move}px)`;
        }, {passive: true});

        viewport.addEventListener('touchend', e => {
            if (!isSwiping) return;
            isSwiping = false;
            wrapper.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
            
            const deltaY = e.changedTouches[0].clientY - startY;
            const deltaX = e.changedTouches[0].clientX - startX;

            // 检测左滑 (deltaX 为负且绝对值大) -> 返回主页
            if (deltaX < -100 && Math.abs(deltaY) < 100) {
                window.location.href = '../../index.html';
                return;
            }
            
            if (Math.abs(deltaY) > 50) {
                if (deltaY < 0) navigate(1);  // 向上划 -> 下一个
                else navigate(-1);           // 向下划 -> 上一个
            } else {
                wrapper.style.transform = `translateY(${currentTranslateY}%)`;
            }
        });

        // 鼠标滚轮支持
        let wheelTimeout;
        viewport.addEventListener('wheel', e => {
            clearTimeout(wheelTimeout);
            wheelTimeout = setTimeout(() => {
                if (e.deltaY > 0) navigate(1);
                else navigate(-1);
            }, 100);
        }, {passive: true});

        // --- 交互逻辑 ---
        function toggleImmersive() {
            isImmersive = !isImmersive;
            const uiElements = [
                document.querySelector('.side-controls'),
                document.querySelector('.bottom-info'),
                document.getElementById('progress-container')
            ];
            
            uiElements.forEach(el => {
                if (el) el.classList.toggle('immersive-hide', isImmersive);
            });
            
            // 更新按钮图标
            immersiveBtn.innerHTML = `<i data-lucide="${isImmersive ? 'minimize-2' : 'maximize-2'}" class="w-6 h-6"></i>`;
            lucide.createIcons();
            
            // 更新提示文字
            document.getElementById('status-text').innerText = isImmersive ? '沉浸模式中 (点击任意处或再次点击按钮退出)' : '上下划切换，左划返回主页';
        }

        // --- 点击交互 ---
        viewport.onclick = (e) => {
            if (e.target.closest('.side-controls') || e.target.closest('.progress-container')) return;
            
            // 如果处于沉浸模式，点击屏幕任何地方先退出沉浸模式
            if (isImmersive) {
                toggleImmersive();
                return;
            }

            const video = document.getElementById(`player-${currentIndex}`);
            if (!video) return;

            if (video.paused) {
                video.play();
                showStateIcon('play');
            } else {
                video.pause();
                showStateIcon('pause');
            }
        };

        function showStateIcon(type) {
            stateIcon.innerHTML = `<i data-lucide="${type}" class="w-16 h-16 text-white fill-white opacity-50"></i>`;
            lucide.createIcons();
            stateIcon.classList.remove('animate');
            void stateIcon.offsetWidth;
            stateIcon.classList.add('animate');
        }

        // --- UI 控制 ---
        autoBtn.onclick = (e) => {
            e.stopPropagation();
            isAuto = !isAuto;
            autoBtn.classList.toggle('bg-indigo-600', isAuto);
            autoBtn.classList.toggle('bg-white/10', !isAuto);
            autoBtn.innerHTML = `<i data-lucide="${isAuto ? 'play-circle' : 'pause-circle'}" class="w-6 h-6"></i>`;
            lucide.createIcons();
        };

        muteBtn.onclick = (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            const video = document.getElementById(`player-${currentIndex}`);
            if (video) video.muted = isMuted;
            // 图标逻辑：isMuted 为 true 显示静音图标，否则显示音量图标
            muteBtn.innerHTML = `<i data-lucide="${isMuted ? 'volume-x' : 'volume-2'}" class="w-6 h-6"></i>`;
            muteBtn.classList.toggle('text-red-400', isMuted);
            lucide.createIcons();
        };

        immersiveBtn.onclick = (e) => {
            e.stopPropagation();
            toggleImmersive();
        };

        // 进度条拖拽处理
        const handleProgress = (e) => {
            const video = document.getElementById(`player-${currentIndex}`);
            if (!video) return;
            const rect = progressContainer.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const percent = Math.min(Math.max(0, (clientX - rect.left) / rect.width), 1);
            progressBar.style.width = `${percent * 100}%`;
            if (!isDraggingProgress) {
                video.currentTime = percent * video.duration;
            }
            return percent;
        };

        progressContainer.onmousedown = (e) => {
            isDraggingProgress = true;
            handleProgress(e);
        };

        progressContainer.ontouchstart = (e) => {
            isDraggingProgress = true;
            handleProgress(e);
        };

        window.addEventListener('mousemove', e => {
            if (isDraggingProgress) handleProgress(e);
        });

        window.addEventListener('touchmove', e => {
            if (isDraggingProgress) handleProgress(e);
        }, {passive: false});

        window.addEventListener('mouseup', e => {
            if (isDraggingProgress) {
                isDraggingProgress = false;
                const video = document.getElementById(`player-${currentIndex}`);
                if (video) {
                    const rect = progressContainer.getBoundingClientRect();
                    const percent = Math.min(Math.max(0, (e.clientX - rect.left) / rect.width), 1);
                    video.currentTime = percent * video.duration;
                }
            }
        });

        window.addEventListener('touchend', e => {
            if (isDraggingProgress) {
                isDraggingProgress = false;
                const video = document.getElementById(`player-${currentIndex}`);
                if (video) {
                    const rect = progressContainer.getBoundingClientRect();
                    const clientX = e.changedTouches[0].clientX;
                    const percent = Math.min(Math.max(0, (clientX - rect.left) / rect.width), 1);
                    video.currentTime = percent * video.duration;
                }
            }
        });

        // 键盘支持
        document.onkeydown = (e) => {
            if (e.code === 'Space') viewport.click();
            if (e.code === 'ArrowDown') navigate(1);
            if (e.code === 'ArrowUp') navigate(-1);
            if (e.code === 'KeyM') muteBtn.click();
            if (e.code === 'KeyI' || e.code === 'KeyF') toggleImmersive();
            if (e.code === 'Escape' && isImmersive) toggleImmersive();
        };
    </script>
</body>
</html>
